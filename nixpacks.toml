[variables]
LD_LIBRARY_PATH = "/nix/var/nix/profiles/default/lib:/nix/var/nix/profiles/default/lib64"

[phases.build]
cmds = []
dependsOn = ["install"]
onlyIncludeFiles = []

[phases.setup]
nixPkgs = ['nodejs_20', 'postgresql', 'python311', 'stdenv.cc.cc.lib']

[phases.install]
cmds = ['npm ci', 'python3.11 -m venv .venv', '.venv/bin/python -m ensurepip --upgrade', '.venv/bin/python -m pip install --upgrade pip setuptools wheel', '.venv/bin/python -m pip install --no-cache-dir earnings==1.1.0']

[start]
cmd = 'PYTHON_BIN=/app/.venv/bin/python node src/index.js'
